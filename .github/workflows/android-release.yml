name: Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name, for example 1.2.3"
        required: true
        type: string
      release_notes:
        description: "Release notes"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    if: github.repository == 'farshadfard/sarmaye-man' && github.actor == 'farshadfard'
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use X.Y.Z format" >&2
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=android-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Test web app
        run: npm test

      - name: Build bundled Android web assets
        run: npm run build:android-web
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.name }}
          VITE_NATIVE_ANDROID: "1"

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode signing keystore
        shell: bash
        run: |
          if [[ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is required" >&2
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/android-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/android-release.jks" >> "$GITHUB_ENV"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Prepare release assets
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mkdir -p release-assets
          cp android/app/build/outputs/apk/release/app-release.apk "release-assets/sarmaye-man-v$VERSION.apk"
          (cd release-assets && sha256sum "sarmaye-man-v$VERSION.apk" > "sarmaye-man-v$VERSION.apk.sha256")

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          FLAGS=()
          if [[ "$PRERELEASE" == "true" ]]; then
            FLAGS+=(--prerelease)
          fi
          NOTES="${RELEASE_NOTES:-Android release v$VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "سرمایه من Android v$VERSION" --notes "$NOTES" "${FLAGS[@]}"
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* --target "$GITHUB_SHA" --title "سرمایه من Android v$VERSION" --notes "$NOTES" "${FLAGS[@]}"
          fi
